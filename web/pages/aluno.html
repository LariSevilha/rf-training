<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
  <title>RF Fitness</title>

  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/aluno-clean.css" />

  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="RF Fitness">
  <link rel="icon" type="image/png" sizes="192x192" href="/img/logoapp-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/img/logoapp-512.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RF Fitness">
  <link rel="apple-touch-icon" sizes="180x180" href="/img/logoapp-ios-180.png">
</head>
<body class="pageAluno alunoClean studentBooting">
  <!-- ... (todo o conteúdo do body permanece igual até o final) ... -->

  <div class="pdfOverlay" id="pdfOverlay" aria-hidden="true">
    <div class="pdfBar">
      <button class="backBtn" id="pdfBack" type="button">← Voltar</button>
      <div class="pdfTitle" id="pdfTitle">PDF</div>
    </div>
    <div class="pdfFrameWrap">
      <iframe id="pdfFrame" 
              title="Visualização de PDF" 
              allow="fullscreen; autoplay; encrypted-media; picture-in-picture; clipboard-read; clipboard-write" 
              referrerpolicy="no-referrer-when-downgrade"
              sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
      <div class="loadingLayer" id="loadingLayer">
        <div class="spinner"></div>
        <div class="loadingText">Carregando…</div>
        <div class="loadingSub">Se demorar, verifique sua conexão.</div>
      </div>
    </div>
  </div>

  <!-- resto do HTML permanece igual -->

  <script>
    document.getElementById("yearNow").textContent = String(new Date().getFullYear());
    (function () {
      const h = new Date().getHours();
      const t = (h < 12) ? "Bom dia" : (h < 18) ? "Boa tarde" : "Boa noite";
      const el = document.getElementById("greeting");
      if (el) el.textContent = t;
    })();

    // ====================== FIXES PARA iOS ======================
    
    // Função para abrir links externos (YouTube, Drive, etc) sem tela branca
    window.openExternal = function(url) {
      if (!url) return;
      console.log("Abrindo link externo:", url);
      
      window.open(url, '_blank');
      
      // Previne tela branca ao voltar
      setTimeout(() => {
        window.addEventListener('pageshow', function handler(e) {
          if (e.persisted) {
            console.log("Retornando de link externo");
          }
          window.removeEventListener('pageshow', handler);
        });
      }, 300);
    };

    // Função específica para vídeos do YouTube
    window.abrirVideo = function(url) {
      if (!url) return;
      
      // Se for YouTube, força embed com playsinline
      if (url.includes("youtube.com") || url.includes("youtu.be")) {
        const videoId = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/)?.[1];
        if (videoId) {
          url = `https://www.youtube.com/embed/${videoId}?autoplay=1&playsinline=1&rel=0`;
        }
      }
      
      window.openExternal(url);
    };
  </script>

  <script type="module" src="../assets/js/aluno.js"></script>
</body>
</html>
